name: Go Test

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Run go test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...
